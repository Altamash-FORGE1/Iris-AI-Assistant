services:
  postgres:
    image: postgres:15-alpine
    container_name: iris_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iris_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iris_password}
      POSTGRES_DB: ${POSTGRES_DB:-iris_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iris_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iris_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iris_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_APP: wsgi.py
      DATABASE_URL: postgresql://${POSTGRES_USER:-iris_user}:${POSTGRES_PASSWORD:-iris_password}@postgres:5432/${POSTGRES_DB:-iris_db}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      REDIS_URL: ${REDIS_URL:-redis://localhost:6379}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    command: flask run --host=0.0.0.0
    networks:
      - iris_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: iris_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - iris_network

volumes:
  postgres_data:

networks:
  iris_network:
    driver: bridge
